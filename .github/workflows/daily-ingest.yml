name: Daily Fixtures Ingest

on:
  schedule:
    # 05:23 UTC ≈ 08:23 Istanbul. Off-the-hour on purpose: GitHub's
    # shared cron queue is heaviest at :00, so "0 6" runs get delayed
    # or dropped. An odd minute materially improves fire reliability.
    - cron: "23 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "sqlite:///./football.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Migrate — add xg columns if missing
        # Must run before any ORM query because Match.xg_home/xg_away are
        # now part of the mapped schema. SELECT would fail on an old DB.
        run: python scripts/migrate_add_xg.py

      - name: Migrate — normalize season labels
        # Collapses "2019/2020" / "2025" / "2425" into a single YYMM format
        # per league, so motivation/standings group correctly. Idempotent.
        run: python scripts/migrate_normalize_seasons.py

      - name: Migrate — add live score columns if missing
        # live_minute/live_home/live_away are populated by the separate
        # live-scores workflow; adding them here ensures the ORM's mapped
        # schema matches whatever SELECT we run against Match.
        run: python scripts/migrate_add_live_cols.py

      - name: Migrate — ensure team_availability table exists
        # Pre-creates the table so fetch_availability (below) can write even
        # before main.py's create_all has run on this DB snapshot.
        run: python scripts/migrate_add_availability.py

      - name: Ingest fixtures (next 14 days)
        env:
          FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
        run: python -m app.ingestion.football_data_org --days-ahead 14

      - name: Ingest Big-5 current-season CSV (finished matches + odds)
        # football-data.co.uk publishes a per-league CSV that updates weekly
        # with new results. This is what feeds the standings → motivation chain.
        run: |
          for lg in E0 D1 I1 SP1 F1; do
            python -m app.ingestion.football_data --league $lg --season 2526
          done

      - name: Ingest Understat xG (top-5 leagues)
        # GitHub runners are US-based so Understat is not Turkey-blocked here.
        # Seasons 2023 and 2024 are historical backfill (cheap idempotent
        # updates); 2025 is the live season.
        run: python -m app.ingestion.understat --seasons 2023,2024,2025

      - name: Fetch team availability (injuries / suspensions)
        # api-football /injuries — no-op if FOOTBALL_API_KEY isn't set, so
        # this can ship before the subscription arrives. When set, populates
        # team_availability which the composer reads via _availability_score.
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python -m scripts.fetch_availability --days-ahead 3

      - name: Generate predictions for upcoming matches
        run: python scripts/predict_upcoming.py

      - name: Snapshot today's coupon suggestions into history
        # Persists whatever /coupons would return right now, so the app can
        # show "geçmiş kuponlar" with hit/miss badges after matches settle.
        run: python scripts/record_daily_coupons.py

      - name: Resolve yesterday's coupons from finished match scores
        # Flips hit/miss on every leg whose underlying match now has a score;
        # marks a coupon itself as won/lost once every leg is resolved.
        run: python scripts/resolve_coupons.py

      - name: Checkpoint SQLite WAL
        run: |
          sudo apt-get install -y sqlite3
          sqlite3 football.db "PRAGMA wal_checkpoint(TRUNCATE);"

      - name: Commit updated DB
        # Race-resilient: if main moved between our checkout and our push (e.g.
        # because a manual dispatch ran concurrently), rebase the binary DB
        # onto the new tip with `--ours`, then push again. Without this the
        # job exits 1 on a rejected push and the day's data is lost.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f football.db
          if git diff --cached --quiet; then
            echo "No DB changes."
          else
            git commit -m "data: daily fixtures refresh $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded on attempt $i."
                break
              fi
              echo "Push rejected on attempt $i, rebasing onto origin/main..."
              git pull --rebase -X ours --autostash
            done
          fi
