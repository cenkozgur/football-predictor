name: Daily Fixtures Ingest

on:
  schedule:
    # 05:23 UTC ≈ 08:23 Istanbul. Off-the-hour on purpose: GitHub's
    # shared cron queue is heaviest at :00, so "0 6" runs get delayed
    # or dropped. An odd minute materially improves fire reliability.
    - cron: "23 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "sqlite:///./football.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Migrate — add xg columns if missing
        # Must run before any ORM query because Match.xg_home/xg_away are
        # now part of the mapped schema. SELECT would fail on an old DB.
        run: python scripts/migrate_add_xg.py

      - name: Migrate — normalize season labels
        # Collapses "2019/2020" / "2025" / "2425" into a single YYMM format
        # per league, so motivation/standings group correctly. Idempotent.
        run: python scripts/migrate_normalize_seasons.py

      - name: Migrate — add live score columns if missing
        # live_minute/live_home/live_away are populated by the separate
        # live-scores workflow; adding them here ensures the ORM's mapped
        # schema matches whatever SELECT we run against Match.
        run: python scripts/migrate_add_live_cols.py

      - name: Migrate — ensure team_availability table exists
        # Pre-creates the table so fetch_availability (below) can write even
        # before main.py's create_all has run on this DB snapshot.
        run: python scripts/migrate_add_availability.py

      - name: Ingest fixtures (next 14 days)
        env:
          FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
        run: python -m app.ingestion.football_data_org --days-ahead 14

      - name: Ingest NBA games via ESPN public scoreboard
        # ESPN's site.api endpoint is unauthenticated and returns the
        # current-season schedule. We probed api-sports basketball
        # free tier (2026-04-25): NBA capped at 2022-23, EuroLeague at
        # 2013 — unusable. EuroLeague + BSL stay static-only on the
        # Bugün Ne Var side until we either upgrade to api-sports paid
        # or add a Playwright-backed scrape.
        run: python -m app.ingestion.espn_basketball --days-ahead 14

      - name: Ingest Süper Lig fixtures via api-football (T1)
        # football-data.org's free tier doesn't carry Turkish Süper Lig.
        # api-football Pro covers it, and we already use api-football for
        # xG/odds/availability below. One extra /fixtures call per day is
        # within budget. Bugün Ne Var app reads from /matches and surfaces
        # T1 to Turkish users — the primary audience.
        # NOTE: this module reads API_FOOTBALL_KEY (not FOOTBALL_API_KEY
        # like the others — historical inconsistency).
        env:
          API_FOOTBALL_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python -m app.ingestion.api_football --leagues T1 --days-ahead 14 --no-odds

      - name: Reap stale 'scheduled' matches (settle past-kickoff rows)
        # Leagues outside our live-score polling window (FIN, IRL, NOR) get
        # stuck as 'scheduled' long after kickoff. This sweeps the last 30
        # days and settles any row whose provider reports FINISHED. Safe to
        # run daily; only writes when ft_home is still NULL.
        #
        # The sleep 70 is not optional — football-data.org free tier is 10
        # req/min and the fixtures ingest step above already burned through
        # that budget. Without the pause every FDO call here 429s.
        env:
          FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          sleep 70
          python -m scripts.reap_stale_matches --days-back 30

      - name: Ingest Big-5 current-season CSV (finished matches + odds)
        # football-data.co.uk publishes a per-league CSV that updates weekly
        # with new results. This is what feeds the standings → motivation chain.
        run: |
          for lg in E0 D1 I1 SP1 F1; do
            python -m app.ingestion.football_data --league $lg --season 2526
          done

      # DISABLED 2026-04-26 after xG ablation backtest. WITH-xG vs WITHOUT-xG
      # produced ROI deltas of ±0.2pp across two refit cadences — well inside
      # the statistical noise floor for our pick volume (~376 picks, std err
      # ~2.6%). Conclusion: xG adds no measurable edge on top of Dixon-Coles
      # already trained on 12k+ historical matches. The api-football
      # subscription stays — pre-match odds and T1 fixtures justify the
      # spend on their own. Restore this step if a future ablation shows xG
      # contributing on a market we don't currently target.
      #
      # - name: Backfill xG from api-football (last 7 days)
      #   env:
      #     FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      #   run: python -m scripts.fetch_xg_api_football --days-back 7

      - name: Fetch team availability (injuries / suspensions)
        # api-football /injuries — no-op if FOOTBALL_API_KEY isn't set, so
        # this can ship before the subscription arrives. When set, populates
        # team_availability which the composer reads via _availability_score.
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python -m scripts.fetch_availability --days-ahead 3

      - name: Fetch pre-match odds for upcoming fixtures
        # football-data.co.uk's CSV only has closing odds for FINISHED
        # matches, so the day-of slate has zero odds for tomorrow's
        # fixtures. Without this step the composer's value-edge gate
        # rejects everything (observed 2026-04-25: 20 Big-5 matches, 0
        # odds rows, 0 qualifying picks). api-football's /odds endpoint
        # serves pre-match prices; we tag them with source='AFP' so the
        # priority order still prefers football-data closing odds when
        # both are available later.
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python -m scripts.fetch_prematch_odds --days-ahead 3

      - name: Generate predictions for upcoming matches
        run: python scripts/predict_upcoming.py

      - name: Snapshot today's coupon suggestions into history
        # Persists whatever /coupons would return right now, so the app can
        # show "geçmiş kuponlar" with hit/miss badges after matches settle.
        run: python scripts/record_daily_coupons.py

      - name: Resolve yesterday's coupons from finished match scores
        # Flips hit/miss on every leg whose underlying match now has a score;
        # marks a coupon itself as won/lost once every leg is resolved.
        run: python scripts/resolve_coupons.py

      - name: Checkpoint SQLite WAL
        run: |
          sudo apt-get install -y sqlite3
          sqlite3 football.db "PRAGMA wal_checkpoint(TRUNCATE);"

      - name: Commit updated DB
        # Race-resilient: if main moved between our checkout and our push (e.g.
        # because a manual dispatch ran concurrently), rebase the binary DB
        # onto the new tip with `--ours`, then push again. Without this the
        # job exits 1 on a rejected push and the day's data is lost.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f football.db
          if git diff --cached --quiet; then
            echo "No DB changes."
          else
            git commit -m "data: daily fixtures refresh $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded on attempt $i."
                break
              fi
              echo "Push rejected on attempt $i, rebasing onto origin/main..."
              git pull --rebase -X ours --autostash
            done
          fi
