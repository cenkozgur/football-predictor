name: Composer Backtest

# workflow_dispatch only. Runs the walk-forward simulation of the full
# 6-signal composer on historical matches. Takes several minutes because
# each refit retrains Dixon-Coles on the full prior pool.
on:
  workflow_dispatch:
    inputs:
      leagues:
        description: "Comma-separated internal codes (default Big-5)"
        default: "E0,D1,I1,SP1,F1"
      months:
        description: "Window in months"
        default: "12"

jobs:
  backtest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "sqlite:///./football.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run composer backtest
        run: >
          python scripts/backtest_composer.py
          --leagues ${{ inputs.leagues }}
          --months ${{ inputs.months }}
